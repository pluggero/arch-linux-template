---
fish_enable_vim_mode: true
fish_login_shell_commands:
  - exec /usr/bin/sway
fish_env_variables:
  - name: GPG_TTY # Fix GPG with fish shell
    value: "$(tty)"
  - name: GTK1_RC_FILES
    value: "{{ ansible_env.HOME }}/.gtkrc-2.0"
  - name: LANG
    value: "en_US.UTF-8"
  - name: MOZ_ENABLE_WAYLAND
    value: "1"
  - name: QT_SCREEN_SCALE_FACTORS
    value: "1;1"
  - name: SDL_VIDEODRIVER
    value: "wayland"
  - name: XCURSOR_SIZE
    value: "16"
  - name: XCURSOR_THEME
    value: "Bibata-Modern-Ice"
  - name: XDG_CURRENT_DESKTOP
    value: "sway"
  - name: XDG_SESSION_DESKTOP
    value: "sway"
  - name: _JAVA_AWT_WM_NONREPARENTING
    value: "1"
  - name: XDG_DATA_DIRS
    value: "/usr/local/share:/usr/share:$XDG_DATA_DIRS"
  - name: XCURSOR_PATH
    value: "{{ ansible_env.HOME }}/.icons:/usr/share/icons:/usr/share/pixmaps:$XCURSOR_PATH"
  - name: SSH_AUTH_SOCK
    value: "$XDG_RUNTIME_DIR/ssh-agent.socket"
fish_abbreviations:
  - name: l
    value: "ls -lah"
fish_keybindings:
  - key: \cl
    function: "clear_and_repaint"
fish_functions:
  - name: "y"
    description: "yazi with cwd-file."
    command: |
      set tmp (mktemp -t "yazi-cwd.XXXXXX")
      yazi $argv --cwd-file="$tmp"
      if set cwd (command cat -- "$tmp"); and [ -n "$cwd" ]; and [ "$cwd" != "$PWD" ]
          builtin cd -- "$cwd"
      end
      rm -f -- "$tmp"
  - name: "btc"
    description: "Connect to known devices via bluetooth"
    command: |
      set -l selection (bluetoothctl devices | fzf --header "Select device to connect"); or return 1
      set -l device_mac (echo $selection | cut -d ' ' -f 2)

      if test -z "$device_mac"
          echo "Could not parse device MAC"
          return 1
      end

      bluetoothctl connect $device_mac
  - name: "allow_device"
    description: "Allows a usb device within USBGuard (temporary)"
    command: |
      set -l permanent false

      switch "$argv[1]"
          case --permanent -p
              set permanent true
              set -e argv[1]
          case ''
              # no flag: default is temporary
          case '*'
              echo "Usage: allow-usb [--permanent|-p]"
              return 0
      end

      set -l rule_path '/etc/usbguard/rules.d/99-manual-rules.conf'

      set -l fzf_title 'TEMPORARY: Select USB device to allow'
      if test "$permanent" = true
          set fzf_title 'PERMANENT: Select USB device to allow'
      end

      set -l selection (usbguard list-devices --blocked | fzf --header $fzf_title); or return 1
      set -l usb_id (echo $selection | grep -oP '(?<=id )[0-9a-zA-Z]+:[0-9a-zA-Z]+(?= )')
      set -l device_name (echo $selection | grep -oP '(?<=name ").*?(?=")')

      if test -z "$usb_id"
          echo "Could not parse USB device ID."
          return 1
      end

      if test "$permanent" = true
          echo "Permanently allowing $device_name"
          echo "Appending matching rule to $rule_path"

          usbguard generate-policy --no-ports-sn \
              | grep "id $usb_id" \
              | sed -E 's/\s+parent-hash\s+"[^"]*"//g; s/\s+with-connect-type\s+"[^"]*"//g' \
              | sudo tee -a $rule_path >/dev/null; or return 1

          echo "Setting permissions on $rule_path"
          sudo chmod 600 $rule_path; or return 1

          echo "Restarting USBGuard"
          sudo systemctl restart usbguard; or return 1

          echo "Done"
          return
      end

      echo "Temporarily allowing $device_name"
      sudo usbguard allow-device "$usb_id"; or return 1
  - name: "clear_and_repaint"
    description: "Workaround for the clear-screen issue on remote hosts."
    command: |
      set -g __prompt_suppress_duration 1
      clear
      commandline -f repaint
  - name: "fkill"
    description: "Kill a process selected via fzf."
    command: |
      set pid (ps aux | fzf | awk '{print $2}')
      if test -n "$pid"
          kill -9 $pid
      end
  - name: "take"
    description: "Creates the specified directory and switches into it."
    command: 'mkdir -p -- "$argv" && cd -- "$argv"'
  - name: "teetop"
    description: "Adds content on a top of a file."
    command: |
      # Check if the correct number of arguments is provided
      if test (count $argv) -ne 1
          echo "Usage: prepend_to_file filename"
          return 1
      end

      # Assign argument to variable for clarity
      set filename $argv[1]

      # Check if the file is owned by root
      set file_owner (stat -c '%U' $filename)
      set file_permissions (stat -c '%a' $filename)
      set needs_sudo (test $file_owner = "root"; and echo "true"; or echo "false")


      if test $needs_sudo = true
          # Create unique temporary files
          set temp_file1 (sudo mktemp)
          set temp_file2 (sudo mktemp)

          # Read from stdin and write to the temporary file using sudo
          cat - | sudo tee $temp_file1

          # Concatenate the temporary file with the original file using sudo and overwrite the original file
          sudo sh -c "cat $temp_file1 $filename > $temp_file2 && mv $temp_file2 $filename && sudo chmod $file_permissions $filename && rm $temp_file1"
      else
          # Create unique temporary files
          set temp_file1 (mktemp)
          set temp_file2 (mktemp)

          # Read from stdin and write to the temporary file
          cat - >$temp_file1

          # Concatenate the temporary file with the original file and overwrite the original file
          sh -c "cat $temp_file1 $filename > $temp_file2 && mv $temp_file2 $filename && chmod $file_permissions $filename && rm $temp_file1"
      end
  - name: "ttake"
    description: "Creates a temporary directory and switches into it."
    command: "cd (mktemp -d)"

fish_additional_config:
  - "zoxide init fish | source"
fish_colors:
  - name: fish_color_command
    value: "green"
  - name: fish_color_param
    value: "magenta"
  - name: fish_color_valid_path
    value: "blue"
fish_prompt_custom: |
  # Example:
  # [nim@Hattori:~]-[2026-07-18 02:07:06pm UTC+2]-[I]
  # $ sleep 2
  # [took 2s]
  # [nim@Hattori:~/w/dashboard]-[2026-07-18 02:07:09pm UTC+2]-[I]-[V:django20]-[G:main]
  # | 2    15054    0%    running    sleep 100000
  # $ echo hi
  # hi
  # [took 12ms]
  # [nim@Hattori:~/w/dashboard]-[2026-07-18 02:07:09pm UTC+2]-[I]-[V:django20]-[G:main]
  # $

  set -l retc red
  test $status = 0; and set retc green

  # Duration of last command, own line, omitted entirely when there's
  # nothing to report (no extra blank line). A row can be redrawn several
  # times in normal mode before it closes (e.g. terminal resize), so the
  # flag must survive those redraws and only be cleared on --final-rendering
  # - fish's reliable "row is closing" signal, fired for real commands and
  # empty Enter alike. Uses a fish_postexec flag rather than comparing
  # CMD_DURATION values, since two consecutive fast commands can round to
  # the same ms value. __prompt_suppress_duration lets clear_and_repaint
  # force a clean prompt (no stale duration) on a manual screen clear.
  function __cmd_postexec_flag --on-event fish_postexec
      set -g __cmd_just_finished 1
  end

  set -l should_show_duration 0
  if contains -- --final-rendering $argv
      set should_show_duration $__prompt_shows_duration
      set -e __cmd_just_finished
  else if set -q __prompt_suppress_duration
      set -e __prompt_suppress_duration
      set -e __cmd_just_finished
      set -g __prompt_shows_duration 0
  else
      if set -q __cmd_just_finished
          set should_show_duration 1
      end
      set -g __prompt_shows_duration $should_show_duration
  end

  if test "$should_show_duration" = 1
      set -l dur_label
      if test $CMD_DURATION -lt 1000
          set dur_label $CMD_DURATION"ms"
      else
          set -l total_s (math -s0 "$CMD_DURATION / 1000")
          set -l dur_h (math -s0 "$total_s / 3600")
          set -l dur_m (math -s0 "($total_s % 3600) / 60")
          set -l dur_s (math -s0 "$total_s % 60")
          if test $dur_h -gt 0
              set dur_label ""$dur_h"h "$dur_m"m "$dur_s"s"
          else if test $dur_m -gt 0
              set dur_label ""$dur_m"m "$dur_s"s"
          else
              set dur_label (math -s1 "$CMD_DURATION / 1000")"s"
          end
      end
      set_color -o red
      echo "[took "$dur_label"]"
      set_color normal
  end

  set -q __fish_git_prompt_showupstream
  or set -g __fish_git_prompt_showupstream auto

  # Wraps one "-[name:value]" segment.
  function _nim_prompt_wrapper
      set retc $argv[1]
      set -l field_name $argv[2]
      set -l field_value $argv[3]

      set_color normal
      set_color $retc
      echo -n '-'
      set_color -o green
      echo -n '['
      set_color normal
      test -n $field_name
      and echo -n $field_name:
      set_color $retc
      echo -n $field_value
      set_color -o green
      echo -n ']'
  end

  set_color -o green
  echo -n [

  if functions -q fish_is_root_user; and fish_is_root_user
      set_color -o red
  else
      set_color -o yellow
  end

  echo -n $USER
  set_color -o white
  echo -n @

  if test -z "$SSH_CLIENT"
      set_color -o blue
  else
      set_color -o cyan
  end

  echo -n (prompt_hostname)
  set_color -o white
  echo -n :(prompt_pwd)
  set_color -o green
  echo -n ']'

  # Date/time + UTC offset. fish_transient_prompt repaints this row on
  # submit, so a plain `date` call here reflects the actual submit time.
  set -g fish_transient_prompt 1
  set -l tz (date "+%z")
  set -l tz_sign (string sub -l 1 -- $tz)
  set -l tz_hh (math (string sub -s 2 -l 2 -- $tz))
  set -l tz_mm (string sub -s 4 -l 2 -- $tz)
  set -l tz_label "UTC$tz_sign$tz_hh"
  test "$tz_mm" != "00"; and set tz_label "$tz_label:$tz_mm"
  _nim_prompt_wrapper $retc '' (date "+%Y-%m-%d %I:%M:%S%P")" $tz_label"

  # Vi-mode (default mode-prompt would misalign this layout)
  function fish_mode_prompt
  end

  if test "$fish_key_bindings" = fish_vi_key_bindings
      or test "$fish_key_bindings" = fish_hybrid_key_bindings
      set -l mode
      switch $fish_bind_mode
          case default
              set mode (set_color --bold red)N
          case insert
              set mode (set_color --bold green)I
          case replace_one
              set mode (set_color --bold green)R
              echo '[R]'
          case replace
              set mode (set_color --bold cyan)R
          case visual
              set mode (set_color --bold magenta)V
      end
      set mode $mode(set_color normal)
      _nim_prompt_wrapper $retc '' $mode
  end


  # Virtual Environment
  set -q VIRTUAL_ENV_DISABLE_PROMPT
  or set -g VIRTUAL_ENV_DISABLE_PROMPT true
  set -q VIRTUAL_ENV
  and _nim_prompt_wrapper $retc V (basename "$VIRTUAL_ENV")

  # git
  set -l prompt_git (fish_git_prompt '%s')
  test -n "$prompt_git"
  and _nim_prompt_wrapper $retc G $prompt_git

  # New line
  echo

  # Background jobs
  set_color normal

  for job in (jobs)
      set_color $retc
      echo -n '| '
      set_color brown
      echo $job
  end

  set_color normal
  set_color -o red
  echo -n '$ '
  set_color normal
